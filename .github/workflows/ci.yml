name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (light, torch-free)
        run: pip install -e ".[benchmark,dev]"
      - name: Lint (front-door package)
        run: ruff check scoutbench tests
      - name: Test
        run: pytest tests -q
